services:
  redis:
    image: redis:5-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - backend

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: deadcode_detector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - backend

  backend:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: prod.txt
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
      DJANGO_DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    restart: unless-stopped
    networks:
      - backend

  celery-worker:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: prod.txt
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
      DJANGO_DEBUG: "False"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A core worker -l info --pool=solo
    restart: unless-stopped
    networks:
      - backend

  celery-beat:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: prod.txt
    env_file:
      - .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
      DJANGO_DEBUG: "False"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A core beat -l info
    restart: unless-stopped
    networks:
      - backend

  rag:
    build:
      context: ./services/rag
    env_file:
      - .env.docker
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004
    restart: unless-stopped
    networks:
      - backend

volumes:
  redis_data:
  pgdata:

networks:
  backend:
    driver: bridge
