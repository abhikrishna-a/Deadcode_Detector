services:
  pgbouncer:
    image: edoburu/pgbouncer:1.23.1
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    restart: unless-stopped

  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    env_file: .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      pgbouncer:
        condition: service_started
      rag:
        condition: service_started
    command: >
      sh -c "python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    restart: unless-stopped

  celery-worker:
    build: ./Backend
    env_file: .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      pgbouncer:
        condition: service_started
    command: celery -A core worker -l info --pool=solo
    restart: unless-stopped

  celery-beat:
    build: ./Backend
    env_file: .env.docker
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.prod
    depends_on:
      pgbouncer:
        condition: service_started
    command: celery -A core beat -l info
    restart: unless-stopped

  rag:
    build: ./services/rag
    env_file: .env.docker
    ports:
      - "8004:8004"
    depends_on:
      pgbouncer:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --loop asyncio
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
      - rag
    restart: unless-stopped

volumes:
  caddy_data:
