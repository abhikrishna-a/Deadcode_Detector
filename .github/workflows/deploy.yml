name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ruff lint (backend)
        uses: astral-sh/ruff-action@v3
        with:
          src: Backend/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend lint
        working-directory: Frontend
        run: |
          npm ci
          npm run lint

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: deadcode_detector
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install backend dependencies
        working-directory: Backend
        run: |
          pip install -r requirements/base.txt -r requirements/prod.txt

      - name: Django tests
        working-directory: Backend
        env:
          SECRET_KEY: test-key-not-for-production
          DB_HOST: localhost
          DB_PASSWORD: test
          REDIS_URL: redis://localhost:6379
          CELERY_BROKER_URL: redis://localhost:6379/0
          CELERY_RESULT_BACKEND: redis://localhost:6379/1
          RAG_DATABASE_URL: sqlite+aiosqlite:///./test.db
        run: python manage.py test --verbosity=2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Vite build
        working-directory: Frontend
        run: |
          npm ci
          npm run build

  build-and-push:
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: Backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          build-args: |
            EXTRA_REQS=prod.txt

      - name: Build and push rag
        uses: docker/build-push-action@v6
        with:
          context: services/rag
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rag:latest,${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/rag:${{ github.sha }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Pre-deploy backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            mkdir -p /tmp/ghostcode-backups
            docker compose -f /opt/ghostcode/docker-compose.prod.yml exec -T postgres \
              pg_dump -U postgres deadcode_detector 2>/dev/null | gzip \
              > /tmp/ghostcode-backups/pre_deploy_$(date +%Y%m%d_%H%M%S).sql.gz

      - name: Pull and restart services
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /opt/ghostcode
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build
            docker compose -f docker-compose.prod.yml exec -T backend python manage.py migrate
            docker compose -f docker-compose.prod.yml restart backend
            # Clean up old Docker images
            docker image prune -af
