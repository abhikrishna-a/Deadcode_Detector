name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts
          eval $(ssh-agent -s)
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_rsa_tmp
          chmod 600 ~/.ssh/id_rsa_tmp
          ssh-add ~/.ssh/id_rsa_tmp
          rm -f ~/.ssh/id_rsa_tmp
          ssh -o StrictHostKeyChecking=accept-new ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} "bash /home/ec2-user/app/scripts/deploy.sh"

      - name: Verify health
        run: |
          curl -sf https://api-ghostcode.duckdns.org/api/auth/session/ && echo "✅ Backend healthy"
