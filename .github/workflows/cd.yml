name: CD

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & tag production images
        run: |
          SHORT_SHA=${{ github.sha }}

          docker compose -f docker-compose.prod.yml build

          # Tag each service image with commit SHA + latest
          for service in backend frontend rag; do
            IMAGE_ID="$REGISTRY/${{ github.repository }}/$service"
            docker tag "ghostcode-$service:latest" "$IMAGE_ID:$SHORT_SHA"
            docker tag "ghostcode-$service:latest" "$IMAGE_ID:latest"
          done

      - name: Push images to registry
        run: |
          SHORT_SHA=${{ github.sha }}
          for service in backend frontend rag; do
            IMAGE_ID="$REGISTRY/${{ github.repository }}/$service"
            docker push "$IMAGE_ID:$SHORT_SHA"
            docker push "$IMAGE_ID:latest"
          done

      - name: Deploy to production via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/ghostcode
            git pull origin main
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

      - name: Post-deploy smoke tests
        run: |
          echo "Waiting for services to be ready..."
          sleep 15

          # Check Django
          curl -sf http://${{ secrets.DEPLOY_HOST }}/api/auth/session/ \
            | python -c "import sys,json; data=json.load(sys.stdin); assert data.get('isAuthenticated')==False"

          # Check RAG
          curl -sf http://${{ secrets.DEPLOY_HOST }}/rag/health \
            | python -c "import sys,json; data=json.load(sys.stdin); assert data.get('status')=='ok'"

          echo "Smoke tests passed."

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::Deployment failed. Runbook: https://github.com/${{ github.repository }}/blob/main/DEPLOYMENT.md#5-rollback--troubleshooting"
