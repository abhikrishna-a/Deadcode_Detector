services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: deadcode_detector
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  backend:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: dev.txt
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DJANGO_DEBUG: "True"
    volumes:
      - ./Backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: >
      sh -c "python manage.py runserver 0.0.0.0:8000"
    restart: unless-stopped

  celery-worker:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: dev.txt
    env_file:
      - .env.docker
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DJANGO_DEBUG: "True"
    volumes:
      - ./Backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A core worker -l info --pool=solo
    restart: unless-stopped

  celery-beat:
    build:
      context: ./Backend
      args:
        EXTRA_REQS: dev.txt
    env_file:
      - .env.docker
      - .env
    environment:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      DJANGO_DEBUG: "True"
    volumes:
      - ./Backend:/app
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    command: celery -A core beat -l info
    restart: unless-stopped

  rag:
    build:
      context: ./services/rag
    env_file:
      - .env.docker
      - .env
    volumes:
      - ./services/rag:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8004 --reload --loop asyncio
    restart: unless-stopped

volumes:
  redis_data:
  pgdata:
